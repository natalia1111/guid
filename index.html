<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Галерея из 52 картинок</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    .slider {
      position: relative;
      max-width: 900px;
      margin: 20px auto;
    }
    .slider img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      display: none;
    }
    .slider img.active {
      display: block;
      margin: 0 auto;
    }
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      font-size: 18px;
    }
    .prev { left: 10px; }
    .next { right: 10px; }

    /* Дополнительные настройки для маленьких экранов */
    @media (max-width: 600px) {
      .slider img { border-radius: 5px; }
      .nav-btn { font-size: 14px; padding: 6px; }
    }
    @media (min-width: 1200px) {
      .slider img { max-width: 900px; }
    }

    .controls {
      margin-top: 20px;
    }
    input[type="number"] {
      width: 60px;
      padding: 5px;
      text-align: center;
    }
    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="slider">

  <button class="nav-btn prev" onclick="showSlide(-1)">&#10094;</button>
  <button class="nav-btn next" onclick="showSlide(1)">&#10095;</button>
</div>

<div class="controls">
  <button onclick="goBack()">Вернуться</button>
  <input type="number" id="slideNumber" min="1" max="52" placeholder="№">
  <button onclick="goToSlide()">Перейти</button>
</div>

<script>
  let current = 0;
  const slides = document.querySelectorAll('.slider img');

  function showSlide(direction) {
    slides[current].classList.remove('active');
    current = (current + direction + slides.length) % slides.length;
    slides[current].classList.add('active');
  }

  function goBack() {
    // Можно сделать возврат на главную страницу
    window.history.back();
    // Или: window.location.href = "index.html";
  }

  function goToSlide() {
    const num = parseInt(document.getElementById('slideNumber').value);
    if (num >= 1 && num <= slides.length) {
      slides[current].classList.remove('active');
      current = num - 1;
      slides[current].classList.add('active');
    } else {
      alert("Введите число от 1 до 52");
    }
  }
</script>

</body>
