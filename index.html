<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Галерея из 52 картинок</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    .slider {
      position: relative;
      max-width: 900px;
      margin: 20px auto;
    }
    .slider img {
      width: 100%;
      border-radius: 10px;
      display: none;
    }
    .slider img.active {
      display: block;
    }
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      font-size: 18px;
    }
    .prev { left: 10px; }
    .next { right: 10px; }
	
	.slider img {
    max-width: 100%;   /* картинка растягивается по ширине контейнера */
    height: auto;      /* сохраняет пропорции */
    border-radius: 10px;
    display: none;
  }

  .slider img.active {
    display: block;
    margin: 0 auto;    /* центрирование */
  }

  /* Дополнительные настройки для маленьких экранов */
  @media (max-width: 600px) {
    .slider img {
      border-radius: 5px;   /* меньше скругление на телефоне */
    }
    .nav-btn {
      font-size: 14px;      /* кнопки меньше */
      padding: 6px;
    }
  }

  @media (min-width: 1200px) {
    .slider img {
      max-width: 900px;     /* ограничение для больших экранов */
    }
  }
  </style>
</head>
<body>

  <button class="nav-btn prev" onclick="showSlide(-1)">&#10094;</button>

<script>
  let current = 0;
  const slides = document.querySelectorAll('.slider img');

  function showSlide(direction) {
    slides[current].classList.remove('active');
    current = (current + direction + slides.length) % slides.length;
    slides[current].classList.add('active');
  }
</script>
